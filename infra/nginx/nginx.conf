events {
  worker_connections 1024;
}

http {
  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
  limit_req_zone $binary_remote_addr zone=portal:10m rate=30r/s;

  # Upstream definitions
  upstream kong       { server api-gateway:8000; }
  upstream admin_app  { server admin:3000; }
  upstream client_app { server client:3000; }
  upstream grafana    { server grafana:3000; }
  upstream jaeger     { server jaeger:16686; }

  # Redirect HTTP to HTTPS
  server {
    listen 80;
    server_name admin.vaulthub.live portal.vaulthub.live api.vaulthub.live grafana.vaulthub.live jaeger.vaulthub.live;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # API Gateway
  server {
    listen 443 ssl;
    server_name api.vaulthub.live;

    ssl_certificate /etc/letsencrypt/live/vaulthub.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaulthub.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    location / {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://kong;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }
  }

  # Admin Panel
  server {
    listen 443 ssl;
    server_name admin.vaulthub.live;

    ssl_certificate /etc/letsencrypt/live/vaulthub.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaulthub.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      limit_req zone=portal burst=50 nodelay;
      proxy_pass http://admin_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # Client Portal
  server {
    listen 443 ssl;
    server_name portal.vaulthub.live;

    ssl_certificate /etc/letsencrypt/live/vaulthub.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaulthub.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      limit_req zone=portal burst=50 nodelay;
      proxy_pass http://client_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # Grafana (monitoring)
  server {
    listen 443 ssl;
    server_name grafana.vaulthub.live;

    ssl_certificate /etc/letsencrypt/live/vaulthub.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaulthub.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://grafana;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # Jaeger (tracing)
  server {
    listen 443 ssl;
    server_name jaeger.vaulthub.live;

    ssl_certificate /etc/letsencrypt/live/vaulthub.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaulthub.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://jaeger;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
