events { worker_connections 1024; }

http {
  server {
    listen 80;
    server_name admin.vaulthub.live portal.vaulthub.live api.vaulthub.live grafana.vaulthub.live jaeger.vaulthub.live;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 200 'CryptoVaultHub is setting up SSL...';
      add_header Content-Type text/plain;
    }
  }
}
