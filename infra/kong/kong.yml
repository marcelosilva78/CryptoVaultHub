_format_version: "3.0"

services:
  - name: admin-api
    url: http://admin-api:3001
    routes:
      - name: admin-routes
        paths: ["/admin"]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          second: 50
          policy: redis
          redis_host: redis
  - name: client-api
    url: http://client-api:3002
    routes:
      - name: client-routes
        paths: ["/client"]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          second: 100
          policy: redis
          redis_host: redis
  - name: auth-service
    url: http://auth-service:3003
    routes:
      - name: auth-routes
        paths: ["/auth"]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          second: 10
          policy: redis
          redis_host: redis

plugins:
  - name: cors
    config:
      origins: ["http://localhost:3010", "http://localhost:3011", "https://admin.cryptovaulthub.com", "https://portal.cryptovaulthub.com"]
      methods: ["GET", "POST", "PATCH", "DELETE", "OPTIONS"]
      headers: ["Content-Type", "Authorization", "X-API-Key"]
  - name: request-size-limiting
    config:
      allowed_payload_size: 1
