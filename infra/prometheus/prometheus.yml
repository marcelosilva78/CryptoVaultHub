global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'kong'
    static_configs:
      - targets: ['api-gateway:8001']
  - job_name: 'services'
    static_configs:
      - targets:
        - 'admin-api:3001'
        - 'client-api:3002'
        - 'auth-service:3003'
        - 'core-wallet-service:3004'
        - 'chain-indexer-service:3006'
        - 'notification-service:3007'
        - 'cron-worker-service:3008'
