global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']
  - job_name: 'kong'
    static_configs:
      - targets: ['api-gateway:8001']
  - job_name: 'services'
    static_configs:
      - targets:
        - 'admin-api:3001'
        - 'client-api:3002'
        - 'auth-service:3003'
        - 'core-wallet-service:3004'
        - 'key-vault-service:3005'
        - 'chain-indexer-service:3006'
        - 'notification-service:3007'
        - 'cron-worker-service:3008'
        - 'rpc-gateway-service:3009'
