# Docker API version compatibility proxy
# Traefik uses /v1.24/ paths; Docker 29+ requires minimum v1.40.
# This server block rewrites any /vX.Y/ prefix to /v1.45/.

server {
    listen 2375;

    location ~* ^/v[0-9]+\.[0-9]+/(.*) {
        proxy_pass http://unix:/var/run/docker.sock:/v1.45/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://unix:/var/run/docker.sock;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
