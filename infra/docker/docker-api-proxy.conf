error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log /dev/stdout;

    # Rewrite old Docker API versions to 1.45 transparently
    # Traefik sends /v1.24/ which Docker 29+ rejects
    server {
        listen 2375;

        location ~* ^/v[0-9]+\.[0-9]+/(.*) {
            proxy_pass http://unix:/var/run/docker.sock:/v1.45/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location / {
            proxy_pass http://unix:/var/run/docker.sock;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
