# =============================================================================
# CryptoVaultHub v2 — Docker Compose
# All services run in Docker. MySQL is external (cluster).
# Traefik handles SSL (Let's Encrypt) + reverse proxy for all subdomains.
# =============================================================================

networks:
  public-net:
    driver: bridge
  internal-net:
    driver: bridge
  vault-net:
    driver: bridge
    internal: true
  monitoring-net:
    driver: bridge
  docker-proxy-net:
    driver: bridge

services:

  # ─── Docker API Version Proxy (compatibility shim for Traefik) ────────────
  # Traefik's internal Go client sends Docker API v1.24 during initial
  # negotiation; Docker 29+ requires min v1.40. This nginx proxy rewrites
  # any versioned path (/v1.24/...) to /v1.45/... before forwarding.

  docker-proxy:
    image: nginx:alpine
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/docker/docker-api-proxy-main.conf:/etc/nginx/nginx.conf:ro
      - ./infra/docker/docker-api-proxy.conf:/etc/nginx/conf.d/docker-proxy.conf:ro
    networks:
      - docker-proxy-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    restart: unless-stopped

  # ─── Traefik Reverse Proxy + SSL ─────────────────────────────

  traefik:
    image: traefik:v3.3
    depends_on:
      - docker-proxy
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://docker-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=public-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # DNS-01 challenge via Cloudflare (works with private IPs / VPN)
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@${BASE_DOMAIN:-vaulthub.live}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
      - "--entrypoints.metrics.address=:8082"
      - "--entrypoints.websecure.http.tls.options=default@file"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
    environment:
      - CF_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /docker/data/traefik/letsencrypt:/letsencrypt
      - ./infra/traefik/tls.yml:/etc/traefik/dynamic/tls.yml:ro
    networks:
      - public-net
      - internal-net
      - monitoring-net
      - docker-proxy-net
    labels:
      # Traefik dashboard at traefik.vaulthub.live (protected by basic auth)
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${BASE_DOMAIN:-vaulthub.live}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_USERS}"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped

  # ─── MySQL (temporary local — remove when migrating to cluster) ──

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /docker/data/mysql:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    networks:
      - internal-net
      - vault-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Redis ───────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync always --maxmemory 2gb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD} --tcp-keepalive 300
    volumes:
      - /docker/data/redis:/data
    networks:
      - internal-net
    deploy:
      resources:
        limits:
          memory: 2560M
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── Kong API Gateway ────────────────────────────────────────

  api-gateway:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./infra/kong/kong.yml:/etc/kong/kong.yml
    networks:
      - public-net
      - internal-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${BASE_DOMAIN:-vaulthub.live}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── Observability ───────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.50.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - /docker/data/prometheus:/prometheus
    networks:
      - monitoring-net
      - internal-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.3.0
    volumes:
      - /docker/data/grafana:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: "https://grafana.${BASE_DOMAIN:-vaulthub.live}"
    networks:
      - public-net
      - monitoring-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${BASE_DOMAIN:-vaulthub.live}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - /docker/data/loki:/loki
    networks:
      - monitoring-net
      - internal-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  jaeger:
    image: jaegertracing/all-in-one:1.54
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - public-net
      - monitoring-net
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jaeger.rule=Host(`jaeger.${BASE_DOMAIN:-vaulthub.live}`)"
      - "traefik.http.routers.jaeger.entrypoints=websecure"
      - "traefik.http.routers.jaeger.tls.certresolver=letsencrypt"
      - "traefik.http.services.jaeger.loadbalancer.server.port=16686"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command: --config.file=/etc/alertmanager/alertmanager.yml
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped

  # ─── Application Services ──────────────────────────────────

  admin-api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        SERVICE_PATH: services/admin-api
        PORT: 3001
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SERVICE_NAME=admin-api
      - LOG_LEVEL=info
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - ADMIN_DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/cvh_admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:3003
      - CORE_WALLET_SERVICE_URL=http://core-wallet-service:3004
      - KEY_VAULT_URL=http://key-vault-service:3005
      - KEY_VAULT_SERVICE_URL=http://key-vault-service:3005
      - CHAIN_INDEXER_URL=http://chain-indexer-service:3006
      - CHAIN_INDEXER_SERVICE_URL=http://chain-indexer-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - CRON_WORKER_SERVICE_URL=http://cron-worker-service:3008
      - RPC_GATEWAY_URL=http://rpc-gateway-service:3009
      - CVH_JOBS_MYSQL_HOST=${MYSQL_HOST}
      - CVH_JOBS_MYSQL_PORT=${MYSQL_PORT}
      - CVH_JOBS_MYSQL_USER=${MYSQL_USER}
      - CVH_JOBS_MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - CVH_JOBS_MYSQL_DATABASE=cvh_jobs
      - KAFKA_BROKERS=kafka:9092
      - EVENTBUS_KAFKA_ENABLED=true
      - EVENTBUS_REDIS_ENABLED=true
      - TRACING_ENABLED=true
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - internal-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  client-api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        SERVICE_PATH: services/client-api
        PORT: 3002
    environment:
      - NODE_ENV=production
      - PORT=3002
      - SERVICE_NAME=client-api
      - LOG_LEVEL=info
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - ADMIN_DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/cvh_admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - AUTH_SERVICE_URL=http://auth-service:3003
      - CORE_WALLET_SERVICE_URL=http://core-wallet-service:3004
      - KEY_VAULT_SERVICE_URL=http://key-vault-service:3005
      - CHAIN_INDEXER_SERVICE_URL=http://chain-indexer-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - CRON_WORKER_SERVICE_URL=http://cron-worker-service:3008
      - TRACING_ENABLED=true
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal-net
      - vault-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/client/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  auth-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        SERVICE_PATH: services/auth-service
        PORT: 3003
    environment:
      - NODE_ENV=production
      - PORT=3003
      - SERVICE_NAME=auth-service
      - LOG_LEVEL=info
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/cvh_auth
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN_SECONDS=${JWT_EXPIRES_IN_SECONDS}
      - REFRESH_TOKEN_TTL_DAYS=${REFRESH_TOKEN_TTL_DAYS}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY}
      - PORTAL_URL=${PORTAL_URL:-https://portal.vaulthub.live}
      - TRACING_ENABLED=true
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  core-wallet-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        SERVICE_PATH: services/core-wallet-service
        PORT: 3004
    environment:
      - NODE_ENV=production
      - PORT=3004
      - SERVICE_NAME=core-wallet-service
      - LOG_LEVEL=info
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/cvh_wallets
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      # mTLS for Key Vault communication (opt-in)
      - VAULT_TLS_ENABLED=${VAULT_TLS_ENABLED:-false}
      - VAULT_CLIENT_CERT_PATH=/tls/client.crt
      - VAULT_CLIENT_KEY_PATH=/tls/client.key
      - VAULT_TLS_CA_PATH=/tls/ca.crt
      - KEY_VAULT_URL=${KEY_VAULT_URL:-http://key-vault-service:3005}
      - TRACING_ENABLED=true
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
    volumes:
      - ./infra/vault-tls/vault-client.crt:/tls/client.crt:ro
      - ./infra/vault-tls/vault-client.key:/tls/client.key:ro
      - ./infra/vault-tls/vault-ca.crt:/tls/ca.crt:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal-net
      - vault-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  key-vault-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        SERVICE_PATH: services/key-vault-service
        PORT: 3005
    environment:
      - NODE_ENV=production
      - PORT=3005
      - SERVICE_NAME=key-vault-service
      - LOG_LEVEL=info
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/cvh_keyvault
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - VAULT_MASTER_PASSWORD=${VAULT_MASTER_PASSWORD}
      # mTLS server configuration (opt-in)
      - VAULT_TLS_ENABLED=${VAULT_TLS_ENABLED:-false}
      - VAULT_TLS_CERT_PATH=/tls/server.crt
      - VAULT_TLS_KEY_PATH=/tls/server.key
      - VAULT_TLS_CA_PATH=/tls/ca.crt
      - TRACING_ENABLED=true
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
    volumes:
      - ./infra/vault-tls/vault-server.crt:/tls/server.crt:ro
      - ./infra/vault-tls/vault-server.key:/tls/server.key:ro
      - ./infra/vault-tls/vault-ca.crt:/tls/ca.crt:ro
      - ./infra/vault-tls/vault-client.crt:/tls/client.crt:ro
      - ./infra/vault-tls/vault-client.key:/tls/client.key:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vault-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  chain-indexer-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        SERVICE_PATH: services/chain-indexer-service
        PORT: 3006
    environment:
      - NODE_ENV=production
      - PORT=3006
      - SERVICE_NAME=chain-indexer-service
      - LOG_LEVEL=info
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/cvh_indexer
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - RPC_ETH_HTTP=${RPC_ETH_HTTP}
      - RPC_ETH_WS=${RPC_ETH_WS}
      - RPC_BSC_HTTP=${RPC_BSC_HTTP}
      - RPC_BSC_WS=${RPC_BSC_WS}
      - RPC_POLYGON_HTTP=${RPC_POLYGON_HTTP}
      - TATUM_API_KEY=${TATUM_API_KEY}
      - KAFKA_BROKERS=kafka:9092
      - EVENTBUS_KAFKA_ENABLED=true
      - EVENTBUS_REDIS_ENABLED=true
      - TRACING_ENABLED=true
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - internal-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  notification-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        SERVICE_PATH: services/notification-service
        PORT: 3007
    environment:
      - NODE_ENV=production
      - PORT=3007
      - SERVICE_NAME=notification-service
      - LOG_LEVEL=info
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/cvh_notifications
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - KAFKA_BROKERS=kafka:9092
      - EVENTBUS_KAFKA_ENABLED=true
      - EVENTBUS_REDIS_ENABLED=true
      - TRACING_ENABLED=true
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - internal-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3007/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  cron-worker-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        SERVICE_PATH: services/cron-worker-service
        PORT: 3008
    environment:
      - NODE_ENV=production
      - PORT=3008
      - SERVICE_NAME=cron-worker-service
      - LOG_LEVEL=info
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/cvh_wallets
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - KEY_VAULT_URL=http://key-vault-service:3005
      - RPC_GATEWAY_URL=http://rpc-gateway-service:3009
      - CORE_WALLET_SERVICE_URL=http://core-wallet-service:3004
      - EXPORT_STORAGE_PATH=${EXPORT_STORAGE_PATH:-/data/exports}
      - KAFKA_BROKERS=kafka:9092
      - EVENTBUS_KAFKA_ENABLED=true
      - EVENTBUS_REDIS_ENABLED=true
      - TRACING_ENABLED=true
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
    volumes:
      - /docker/data/exports:${EXPORT_STORAGE_PATH:-/data/exports}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - internal-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3008/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  rpc-gateway-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        SERVICE_PATH: services/rpc-gateway-service
        PORT: 3009
    environment:
      - NODE_ENV=production
      - PORT=3009
      - SERVICE_NAME=rpc-gateway-service
      - LOG_LEVEL=info
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - ADMIN_DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/cvh_admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - KAFKA_BROKERS=kafka:9092
      - EVENTBUS_KAFKA_ENABLED=true
      - EVENTBUS_REDIS_ENABLED=true
      - TRACING_ENABLED=true
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - internal-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3009/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Frontend Apps ────────────────────────────────────────

  admin:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nextjs
      args:
        APP_PATH: apps/admin
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_AUTH_API_URL=https://api.${BASE_DOMAIN:-vaulthub.live}/auth
      - NEXT_PUBLIC_ADMIN_API_URL=https://api.${BASE_DOMAIN:-vaulthub.live}/admin
      - ADMIN_API_URL=http://api-gateway:8000/admin
      - AUTH_API_URL=http://api-gateway:8000/auth
    networks:
      - public-net
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.${BASE_DOMAIN:-vaulthub.live}`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.admin.middlewares=security-headers"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nextjs
      args:
        APP_PATH: apps/client
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_AUTH_API_URL=https://api.${BASE_DOMAIN:-vaulthub.live}/auth
      - NEXT_PUBLIC_CLIENT_API_URL=https://api.${BASE_DOMAIN:-vaulthub.live}/client
      - CLIENT_API_URL=http://api-gateway:8000/client
      - AUTH_API_URL=http://api-gateway:8000/auth
    networks:
      - public-net
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=Host(`portal.${BASE_DOMAIN:-vaulthub.live}`)"
      - "traefik.http.routers.portal.entrypoints=websecure"
      - "traefik.http.routers.portal.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portal.middlewares=security-headers"
      - "traefik.http.services.portal.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── PostHog Analytics ─────────────────────────────────────

  posthog-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: posthog
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: posthog
    volumes:
      - /docker/data/posthog-postgres:/var/lib/postgresql/data
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped

  posthog-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - /docker/data/posthog-redis:/data
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    volumes:
      - /docker/data/clickhouse:/var/lib/clickhouse
      - ./infra/clickhouse/clickhouse-config.xml:/etc/clickhouse-server/config.d/posthog.xml:ro
      - ./infra/clickhouse/clickhouse-user-config.xml:/etc/clickhouse-server/users.d/posthog-users.xml:ro
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_LOG_RETENTION_HOURS: "168"
      KAFKA_LOG_RETENTION_BYTES: "5368709120"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - /docker/data/kafka:/var/lib/kafka/data
    networks:
      - internal-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.7.0
    entrypoint: ["/bin/bash", "/scripts/init-topics.sh"]
    volumes:
      - ./docker/kafka/init-topics.sh:/scripts/init-topics.sh:ro
    networks:
      - internal-net
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: "no"

  posthog-web:
    image: posthog/posthog:latest
    command: bash -c "./bin/migrate && ./bin/docker-server"
    # entrypoint-wrapper.sh patches PostHog source at startup for ClickHouse 25.x
    # compatibility (DateTime64 TTL syntax, removed system.crash_log table).
    entrypoint: ["/entrypoint-wrapper.sh"]
    volumes:
      - ./infra/posthog-patches/entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    environment:
      DATABASE_URL: postgres://posthog:posthog@posthog-postgres:5432/posthog
      REDIS_URL: redis://posthog-redis:6379
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_VERIFY: "false"
      CLICKHOUSE_REPLICATION: "false"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-CHANGE_ME_CLICKHOUSE_PASSWORD}"
      CLICKHOUSE_DATABASE: posthog
      KAFKA_HOSTS: kafka:9092
      SECRET_KEY: ${POSTHOG_SECRET_KEY}
      DISABLE_ASYNC_MIGRATIONS_SETUP: "0"
      POSTHOG_SKIP_MIGRATION_CHECKS: "1"
    depends_on:
      - posthog-postgres
      - posthog-redis
      - clickhouse
      - kafka
    networks:
      - monitoring-net
      - internal-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    restart: unless-stopped

  posthog-worker:
    image: posthog/posthog:latest
    command: ./bin/docker-worker-celery --with-scheduler
    entrypoint: ["/entrypoint-wrapper.sh"]
    volumes:
      - ./infra/posthog-patches/entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    environment:
      DATABASE_URL: postgres://posthog:posthog@posthog-postgres:5432/posthog
      REDIS_URL: redis://posthog-redis:6379
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_VERIFY: "false"
      CLICKHOUSE_REPLICATION: "false"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-CHANGE_ME_CLICKHOUSE_PASSWORD}"
      CLICKHOUSE_DATABASE: posthog
      KAFKA_HOSTS: kafka:9092
      SECRET_KEY: ${POSTHOG_SECRET_KEY}
    depends_on:
      - posthog-postgres
      - posthog-redis
      - clickhouse
      - kafka
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    restart: unless-stopped

# ─── Storage Layout (all on /docker LVM volume) ──────────────────────────────
# Docker daemon data-root : /docker/lib          (images, layers, build cache)
# Persistent bind-mounts  : /docker/data/<svc>
#   mysql          → /docker/data/mysql
#   redis          → /docker/data/redis
#   loki           → /docker/data/loki
#   prometheus     → /docker/data/prometheus
#   grafana        → /docker/data/grafana
#   traefik TLS    → /docker/data/traefik/letsencrypt
#   exports        → /docker/data/exports
#   posthog-pg     → /docker/data/posthog-postgres
#   posthog-redis  → /docker/data/posthog-redis
#   clickhouse     → /docker/data/clickhouse
#   kafka          → /docker/data/kafka
# OS disk (/var)   : only Docker socket + daemon config (< 10 MB)
