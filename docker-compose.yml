version: '3.9'

networks:
  public-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true
  vault-net:
    driver: bridge
    internal: true
  monitoring-net:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api-gateway:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./infra/kong/kong.yml:/etc/kong/kong.yml
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    networks:
      - public-net
      - internal-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 3s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.50.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring-net
      - internal-net

  grafana:
    image: grafana/grafana:10.3.0
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - monitoring-net
      - public-net

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    networks:
      - monitoring-net
      - internal-net

  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - monitoring-net
      - internal-net

  # ─── PostHog Stack ─────────────────────────────────────────

  posthog-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: posthog
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: posthog
    volumes:
      - posthog-pg-data:/var/lib/postgresql/data
    networks:
      - monitoring-net

  posthog-redis:
    image: redis:7-alpine
    networks:
      - monitoring-net

  clickhouse:
    image: clickhouse/clickhouse-server:23.12
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - monitoring-net

  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    networks:
      - monitoring-net

  kafka:
    image: bitnami/kafka:3.6
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      ALLOW_PLAINTEXT_LISTENER: "yes"
    depends_on:
      - zookeeper
    networks:
      - monitoring-net

  posthog-web:
    image: posthog/posthog:latest
    environment:
      DATABASE_URL: postgres://posthog:posthog@posthog-postgres:5432/posthog
      REDIS_URL: redis://posthog-redis:6379
      CLICKHOUSE_HOST: clickhouse
      KAFKA_HOSTS: kafka:9092
    ports:
      - "8010:8000"
    depends_on:
      - posthog-postgres
      - posthog-redis
      - clickhouse
      - kafka
    networks:
      - monitoring-net
      - internal-net

  posthog-worker:
    image: posthog/posthog:latest
    command: ./bin/docker-worker-celery --with-scheduler
    environment:
      DATABASE_URL: postgres://posthog:posthog@posthog-postgres:5432/posthog
      REDIS_URL: redis://posthog-redis:6379
      CLICKHOUSE_HOST: clickhouse
      KAFKA_HOSTS: kafka:9092
    depends_on:
      - posthog-postgres
      - posthog-redis
      - clickhouse
      - kafka
    networks:
      - monitoring-net

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  posthog-pg-data:
  clickhouse-data:
